<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mangathèque — Ma Collection</title>
    <meta name="description" content="Application de collection de mangas et animes">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════ */
        /*  VARIABLES & RESET                          */
        /* ═══════════════════════════════════════════ */
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: rgba(255,255,255,0.04);
            --bg-glass: rgba(255,255,255,0.06);
            --border-glass: rgba(255,255,255,0.08);
            --accent-pink: #ff2d75;
            --accent-cyan: #00e5ff;
            --accent-purple: #b14dff;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: .3s cubic-bezier(.4,0,.2,1);
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body {
            font-family:'Outfit',system-ui,sans-serif;
            background:var(--bg-dark);
            color:var(--text-primary);
            min-height:100vh;
            overflow-x:hidden;
        }
        /* ═══════════════════════════════════════════ */
        /*  BACKGROUND ANIMATED BLOBS                  */
        /* ═══════════════════════════════════════════ */
        .bg-blobs { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
        .blob {
            position:absolute; border-radius:50%; filter:blur(120px); opacity:.18;
            animation:blobFloat 12s ease-in-out infinite alternate;
        }
        .blob-1 { width:500px; height:500px; background:var(--accent-pink); top:-10%; left:-5%; animation-delay:0s; }
        .blob-2 { width:400px; height:400px; background:var(--accent-purple); top:50%; right:-8%; animation-delay:-4s; }
        .blob-3 { width:350px; height:350px; background:var(--accent-cyan); bottom:-5%; left:30%; animation-delay:-8s; }
        @keyframes blobFloat {
            0% { transform:translate(0,0) scale(1); }
            100% { transform:translate(60px,40px) scale(1.15); }
        }
        /* ═══════════════════════════════════════════ */
        /*  LAYOUT                                     */
        /* ═══════════════════════════════════════════ */
        .app { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:24px 20px 60px; }
        /* ═══════════════════════════════════════════ */
        /*  HEADER                                     */
        /* ═══════════════════════════════════════════ */
        .header {
            text-align:center; padding:48px 0 32px;
        }
        .header h1 {
            font-size:clamp(2rem,6vw,3.5rem); font-weight:800;
            background:linear-gradient(135deg,var(--accent-pink),var(--accent-purple),var(--accent-cyan));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            background-clip:text; letter-spacing:-1px;
        }
        .header p { color:var(--text-secondary); margin-top:8px; font-size:1.05rem; font-weight:300; }
        /* ═══════════════════════════════════════════ */
        /*  SEARCH BAR                                 */
        /* ═══════════════════════════════════════════ */
        .search-container {
            display:flex; gap:12px; max-width:600px; margin:0 auto 40px;
        }
        .search-container input {
            flex:1; padding:14px 20px; border-radius:var(--radius); border:1px solid var(--border-glass);
            background:var(--bg-glass); color:var(--text-primary); font-size:1rem; font-family:inherit;
            backdrop-filter:blur(12px); outline:none; transition:var(--transition);
        }
        .search-container input::placeholder { color:var(--text-secondary); }
        .search-container input:focus { border-color:var(--accent-pink); box-shadow:0 0 20px rgba(255,45,117,.15); }
        .search-container button {
            padding:14px 28px; border-radius:var(--radius); border:none; cursor:pointer;
            background:linear-gradient(135deg,var(--accent-pink),var(--accent-purple));
            color:#fff; font-size:1rem; font-weight:600; font-family:inherit;
            transition:var(--transition); white-space:nowrap;
        }
        .search-container button:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(255,45,117,.3); }
        .search-container button:active { transform:translateY(0); }
        /* ═══════════════════════════════════════════ */
        /*  TABS                                       */
        /* ═══════════════════════════════════════════ */
        .tabs {
            display:flex; gap:8px; margin-bottom:28px; justify-content:center; flex-wrap:wrap;
        }
        .tab {
            padding:10px 24px; border-radius:50px; border:1px solid var(--border-glass);
            background:transparent; color:var(--text-secondary); font-family:inherit;
            font-size:.9rem; font-weight:600; cursor:pointer; transition:var(--transition);
        }
        .tab:hover { border-color:var(--accent-pink); color:var(--text-primary); }
        .tab.active {
            background:linear-gradient(135deg,var(--accent-pink),var(--accent-purple));
            color:#fff; border-color:transparent;
        }
        /* ═══════════════════════════════════════════ */
        /*  GRID OF CARDS                              */
        /* ═══════════════════════════════════════════ */
        .grid {
            display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
            gap:20px;
        }
        /* ═══════════════════════════════════════════ */
        /*  CARD                                       */
        /* ═══════════════════════════════════════════ */
        .card {
            background:var(--bg-card); border:1px solid var(--border-glass);
            border-radius:var(--radius); overflow:hidden;
            backdrop-filter:blur(10px); transition:var(--transition);
            animation:cardIn .5s ease both;
        }
        .card:hover {
            transform:translateY(-6px) scale(1.02);
            border-color:var(--accent-pink);
            box-shadow:0 12px 40px rgba(255,45,117,.12), 0 0 60px rgba(177,77,255,.06);
        }
        @keyframes cardIn {
            from { opacity:0; transform:translateY(30px) scale(.95); }
            to { opacity:1; transform:translateY(0) scale(1); }
        }
        .card-img-wrap {
            position:relative; width:100%; aspect-ratio:3/4; overflow:hidden; background:#15151f;
        }
        .card-img-wrap img {
            width:100%; height:100%; object-fit:cover; transition:var(--transition);
        }
        .card:hover .card-img-wrap img { transform:scale(1.08); }
        .card-badge {
            position:absolute; top:10px; right:10px; padding:4px 10px;
            border-radius:20px; font-size:.75rem; font-weight:600;
            background:rgba(0,0,0,.6); backdrop-filter:blur(6px); color:var(--accent-cyan);
        }
        .card-body { padding:14px 16px 16px; }
        .card-title {
            font-size:.95rem; font-weight:600; line-height:1.3;
            display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
            overflow:hidden; margin-bottom:8px;
        }
        .card-meta {
            display:flex; align-items:center; gap:12px; font-size:.8rem; color:var(--text-secondary); margin-bottom:12px;
        }
        .card-meta .score { color:var(--accent-cyan); font-weight:600; }
        .card-actions { display:flex; gap:8px; }
        .btn-action {
            flex:1; padding:8px 0; border-radius:var(--radius-sm); border:none;
            font-family:inherit; font-size:.82rem; font-weight:600; cursor:pointer;
            transition:var(--transition);
        }
        .btn-add {
            background:linear-gradient(135deg,var(--accent-pink),var(--accent-purple));
            color:#fff;
        }
        .btn-add:hover { box-shadow:0 4px 15px rgba(255,45,117,.35); transform:translateY(-1px); }
        .btn-add.added { background:#1a3a2a; color:#4ade80; pointer-events:none; }
        .btn-remove {
            background:rgba(255,60,60,.12); color:#ff6b6b; border:1px solid rgba(255,60,60,.2);
        }
        .btn-remove:hover { background:rgba(255,60,60,.25); }
        /* ═══════════════════════════════════════════ */
        /*  STATES                                     */
        /* ═══════════════════════════════════════════ */
        .message-box {
            text-align:center; padding:60px 20px; color:var(--text-secondary);
        }
        .message-box .emoji { font-size:3rem; margin-bottom:12px; display:block; }
        .message-box p { font-size:1.05rem; max-width:400px; margin:0 auto; line-height:1.6; }
        /* ═══════════════════════════════════════════ */
        /*  LOADER                                     */
        /* ═══════════════════════════════════════════ */
        .loader {
            display:flex; justify-content:center; padding:60px 0;
        }
        .loader-spinner {
            width:48px; height:48px; border-radius:50%;
            border:3px solid var(--border-glass); border-top-color:var(--accent-pink);
            animation:spin .8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        /* ═══════════════════════════════════════════ */
        /*  TOAST                                      */
        /* ═══════════════════════════════════════════ */
        .toast-container {
            position:fixed; bottom:24px; right:24px; z-index:999;
            display:flex; flex-direction:column; gap:8px; pointer-events:none;
        }
        .toast {
            padding:14px 22px; border-radius:var(--radius-sm);
            background:rgba(20,20,30,.9); backdrop-filter:blur(12px);
            border:1px solid var(--border-glass); color:var(--text-primary);
            font-size:.9rem; pointer-events:auto;
            animation:toastIn .4s ease, toastOut .4s ease 2.6s forwards;
        }
        .toast.success { border-left:3px solid #4ade80; }
        .toast.error { border-left:3px solid #ff6b6b; }
        @keyframes toastIn { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
        @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(10px); } }
        /* ═══════════════════════════════════════════ */
        /*  RESPONSIVE                                 */
        /* ═══════════════════════════════════════════ */
        @media(max-width:600px) {
            .search-container { flex-direction:column; }
            .grid { grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
            .header { padding:32px 0 20px; }
            .app { padding:16px 12px 40px; }
        }
    </style>
</head>
<body>

<!-- Animated background blobs -->
<div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<div class="app">
    <!-- Header -->
    <header class="header">
        <h1>🎌 Mangathèque</h1>
        <p>Recherche tes mangas préférés et crée ta collection ultime</p>
    </header>

    <!-- Search -->
    <div class="search-container">
        <input type="text" id="champ-recherche" placeholder="Rechercher un manga... (ex: Naruto, One Piece)" autofocus>
        <button id="bouton-recherche" onclick="lancerRecherche()">🔍 Rechercher</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" id="tab-recherche" onclick="changerOnglet('recherche')">🔍 Recherche</button>
        <button class="tab" id="tab-collection" onclick="changerOnglet('collection')">⭐ Ma Collection <span id="compteur-collection"></span></button>
    </div>

    <!-- Content panels -->
    <section id="panel-recherche">
        <div id="resultats" class="grid"></div>
        <div id="message-recherche" class="message-box">
            <span class="emoji">🔍</span>
            <p>Tape le nom d'un manga dans la barre de recherche pour commencer !</p>
        </div>
    </section>

    <section id="panel-collection" style="display:none;">
        <div id="ma-collection" class="grid"></div>
        <div id="message-collection" class="message-box">
            <span class="emoji">📭</span>
            <p>Ta collection est vide. Recherche des mangas et ajoute tes favoris !</p>
        </div>
    </section>
</div>

<!-- Toasts -->
<div class="toast-container" id="toasts"></div>

<!-- API Client -->
<script src="js/api-client.js"></script>

<script>
    // ═══════════════════════════════════════════
    //  STATE
    // ═══════════════════════════════════════════
    let ongletActif = 'recherche';
    let collectionIds = new Set(); // IDs Jikan dans la collection (pour état boutons)
    let timerDebounce = null;

    // ═══════════════════════════════════════════
    //  INIT
    // ═══════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
        chargerCollection();
        // Recherche au clavier
        const champ = document.getElementById('champ-recherche');
        champ.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') lancerRecherche();
        });
        // Debounce
        champ.addEventListener('input', () => {
            clearTimeout(timerDebounce);
            timerDebounce = setTimeout(() => {
                if (champ.value.trim().length >= 3) lancerRecherche();
            }, 400);
        });
    });

    // ═══════════════════════════════════════════
    //  TABS
    // ═══════════════════════════════════════════
    function changerOnglet(nom) {
        ongletActif = nom;
        document.getElementById('tab-recherche').classList.toggle('active', nom === 'recherche');
        document.getElementById('tab-collection').classList.toggle('active', nom === 'collection');
        document.getElementById('panel-recherche').style.display = nom === 'recherche' ? '' : 'none';
        document.getElementById('panel-collection').style.display = nom === 'collection' ? '' : 'none';
        if (nom === 'collection') chargerCollection();
    }

    // ═══════════════════════════════════════════
    //  SEARCH
    // ═══════════════════════════════════════════
    async function lancerRecherche() {
        const q = document.getElementById('champ-recherche').value.trim();
        if (!q) return;

        const grille = document.getElementById('resultats');
        const msg = document.getElementById('message-recherche');
        msg.style.display = 'none';
        grille.innerHTML = '<div class="loader"><div class="loader-spinner"></div></div>';

        changerOnglet('recherche');

        const reponse = await appeler_backend('recherche_externe', { q });

        if (reponse.statut !== 'ok' || !reponse.resultats.length) {
            grille.innerHTML = '';
            msg.innerHTML = '<span class="emoji">😕</span><p>Aucun résultat trouvé. Essaie un autre titre !</p>';
            msg.style.display = '';
            return;
        }

        grille.innerHTML = reponse.resultats.map((a, i) => carteHTML(a, 'add', i)).join('');
    }

    // ═══════════════════════════════════════════
    //  COLLECTION
    // ═══════════════════════════════════════════
    async function chargerCollection() {
        const grille = document.getElementById('ma-collection');
        const msg = document.getElementById('message-collection');

        const reponse = await appeler_backend('ma_collection');
        if (reponse.statut !== 'ok') return;

        collectionIds = new Set(reponse.collection.map(m => m.id_jikan));
        document.getElementById('compteur-collection').textContent = reponse.total ? `(${reponse.total})` : '';

        if (!reponse.collection.length) {
            grille.innerHTML = '';
            msg.style.display = '';
            return;
        }
        msg.style.display = 'none';
        grille.innerHTML = reponse.collection.map((m, i) => carteHTML(m, 'remove', i)).join('');
    }

    async function ajouterManga(el, manga) {
        el.disabled = true;
        el.textContent = '⏳';
        const data = JSON.parse(decodeURIComponent(manga));
        const r = await appeler_backend('ajouter', data);
        if (r.statut === 'ok') {
            el.textContent = '✓ Ajouté';
            el.classList.add('added');
            collectionIds.add(data.id_jikan);
            toast(r.message, 'success');
            chargerCollection(); // refresh count
        } else {
            el.textContent = '⚠ Déjà ajouté';
            el.classList.add('added');
            toast(r.message, 'error');
        }
    }

    async function supprimerManga(id, el) {
        el.disabled = true;
        const r = await appeler_backend('supprimer', { id });
        if (r.statut === 'ok') {
            el.closest('.card').style.transform = 'scale(.8)';
            el.closest('.card').style.opacity = '0';
            setTimeout(() => { el.closest('.card').remove(); chargerCollection(); }, 300);
            toast(r.message, 'success');
        } else {
            toast(r.message, 'error');
            el.disabled = false;
        }
    }

    // ═══════════════════════════════════════════
    //  CARD HTML
    // ═══════════════════════════════════════════
    function carteHTML(anime, mode, index) {
        const delay = index * 60;
        const scoreText = anime.score ? `⭐ ${anime.score}` : '';
        const epText = anime.episodes ? `${anime.episodes} ch.` : '';
        const imgSrc = anime.image_url || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 3 4%22><rect fill=%22%2315151f%22 width=%223%22 height=%224%22/><text x=%221.5%22 y=%222.2%22 text-anchor=%22middle%22 font-size=%22.6%22>🎌</text></svg>';

        const encodedData = encodeURIComponent(JSON.stringify({
            id_jikan: anime.id_jikan, titre: anime.titre,
            image_url: anime.image_url, synopsis: anime.synopsis || '',
            score: anime.score || 0, episodes: anime.episodes || 0
        }));

        const isInCollection = collectionIds.has(anime.id_jikan);

        let actionBtn = '';
        if (mode === 'add') {
            if (isInCollection) {
                actionBtn = `<button class="btn-action btn-add added">✓ Ajouté</button>`;
            } else {
                actionBtn = `<button class="btn-action btn-add" onclick="ajouterManga(this,'${encodedData}')">⭐ Ajouter</button>`;
            }
        } else {
            actionBtn = `<button class="btn-action btn-remove" onclick="supprimerManga(${anime.id},this)">🗑 Retirer</button>`;
        }

        return `
        <div class="card" style="animation-delay:${delay}ms">
            <div class="card-img-wrap">
                <img src="${imgSrc}" alt="${anime.titre}" loading="lazy">
                ${anime.type ? `<span class="card-badge">${anime.type}</span>` : ''}
            </div>
            <div class="card-body">
                <div class="card-title">${anime.titre}</div>
                <div class="card-meta">
                    ${scoreText ? `<span class="score">${scoreText}</span>` : ''}
                    ${epText ? `<span>${epText}</span>` : ''}
                </div>
                <div class="card-actions">${actionBtn}</div>
            </div>
        </div>`;
    }

    // ═══════════════════════════════════════════
    //  TOAST NOTIFICATIONS
    // ═══════════════════════════════════════════
    function toast(message, type = 'success') {
        const container = document.getElementById('toasts');
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.textContent = message;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3200);
    }
</script>

</body>
</html>
